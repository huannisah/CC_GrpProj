services:
  - type: web
    name: careerai-saas
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: DATABRICKS_HOST
        sync: false
      - key: DATABRICKS_TOKEN
        sync: false
      - key: DATABRICKS_HTTP_PATH
        sync: false
      - key: DATABRICKS_CATALOG
        value: main
      - key: DATABRICKS_SCHEMA
        value: careerai
      - key: SECRET_KEY
        generateValue: true
